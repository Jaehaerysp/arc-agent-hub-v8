name: ✨ Feature Request
description: Suggest an idea or improvement for Arc Agent Hub
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please check [existing issues](../issues) first to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What's missing or awkward today?
      placeholder: There's no way to browse other agents on the network, only my own...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Landing page
        - Dashboard
        - Agents
        - Reputation
        - Validation
        - Transfer
        - Settings
        - Developer Tools
        - Design system / UI
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I've checked this isn't already requested
        - label: I'm willing to help implement this
