name: 🐛 Bug Report
description: Report something that's broken or not working as expected
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please check [existing issues](../issues) first to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I click "Register Agent", the transaction fails with...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: dropdown
    id: page
    attributes:
      label: Where does this happen?
      options:
        - Landing page (/)
        - Dashboard
        - Agents
        - Reputation
        - Validation
        - Transfer
        - Settings
        - Developer Tools
        - Wallet connect / network switch
        - Other
    validations:
      required: true

  - type: dropdown
    id: wallet
    attributes:
      label: Wallet
      options:
        - MetaMask
        - Rabby
        - Other / not sure
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: "Chrome 126 on macOS 14"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Console errors / transaction hash (if any)
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I've confirmed I'm connected to Arc Testnet (chain ID 5042002)
        - label: I've checked this isn't already reported
